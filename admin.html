<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowitize Tech Academy</title>
    <link rel="icon" type="image/png" href="images/Untitled design.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <section class="dashboard">

    <h2>ADMIN DASHBOARD</h2>

    <div class="overview">

        <div class="box dark">
            <h4>Total Enrollments</h4>
            <h1 id="totalStudents">0</h1>
        </div>

        <div class="box">
            <h4>New Students (This Week)</h4>
            <h1 id="newStudents">0</h1>
        </div>

        <div class="box">
            <h4>Course Revenue</h4>
            <h1 id="revenue">0</h1>
        </div>

        <div class="box">
            <h4>Students List</h4>
            <button onclick="viewStudents()">View Students</button>
        </div>

    </div>

    <!-- COURSE SUMMARY -->
    <div class="section">
        <h3>COURSE PERFORMANCE SUMMARY</h3>

        <table>
            <tr>
                <th>Course</th>
                <th>Total Students</th>
                <th>New This Week</th>
            </tr>

            <tr>
                <td>Academic (Grades)</td>
                <td id="gradeTotal">0</td>
                <td id="gradeNew">0</td>
            </tr>

            <tr>
                <td>Tech Bootcamps</td>
                <td id="techTotal">0</td>
                <td id="techNew">0</td>
            </tr>

        </table>
    </div>

</section>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAusxC75OaR11Z4FVynUfOD-xogVpm2BY",
  authDomain: "knowitize-tech-academy.firebaseapp.com",
  databaseURL: "https://knowitize-tech-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "knowitize-tech-academy",
  storageBucket: "knowitize-tech-academy.firebasestorage.app",
  messagingSenderId: "1008377804294",
  appId: "1:1008377804294:web:5591dd1d078fd9150ef587"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// 🔐 PROTECT DASHBOARD
onAuthStateChanged(auth, (user) => {
  if (!user) {
    // Not logged in → redirect to login
    window.location.href = "login.html";
  } else {
    // Logged in → load dashboard data
    loadDashboard();
  }
});

// 📊 UPDATED DASHBOARD DATA FUNCTION
function loadDashboard() {
  const dataRef = ref(db, "students");

  onValue(dataRef, (snapshot) => {
    let data = snapshot.val();
    let totalRevenue = 0;

    let total = 0;
    let newWeek = 0;
    let revenue = 0; // Will only sum "Paid" students

    let gradeTotal = 0;
    let techTotal = 0;
    let gradeNew = 0;
    let techNew = 0;

    let now = new Date();
    let weekAgo = new Date();
    weekAgo.setDate(now.getDate() - 7);

    for (let id in data) {
      let student = data[id];
      total++;

      let studentDate = new Date(student.date);

      // 1. Weekly count logic
      if (studentDate > weekAgo) {
        newWeek++;
        if (student.grade) gradeNew++;
        if (student.tech || student.bootcamp) techNew++;
      }

      // 2. Category Totals logic
      if (student.grade) gradeTotal++;
      if (student.tech || student.bootcamp) techTotal++;

      // 3. 💰 REVENUE LOGIC: Only add if status is "Paid"
      if (student.payment === "Paid") {
        // 1. Try to get price from database
        let price = Number(student.price || 0);

        // 2. FALLBACK: If price is 0, check the course and assign a default
        if (price === 0) {
          if (student.grade) {
            price = 1500; // Default price for Grade students
          } else if (student.tech || student.bootcamp) {
            price = 3000; // Default price for Bootcamp students
          }
        }

        totalRevenue += price;
      }
    }

    // 4. Update UI
    document.getElementById("totalStudents").innerText = total;
    document.getElementById("newStudents").innerText = newWeek;
    
    // Formatting revenue with commas for better readability (e.g., $1,000)
    document.getElementById("revenue").innerText = "$" + revenue.toLocaleString();

    document.getElementById("gradeTotal").innerText = gradeTotal;
    document.getElementById("techTotal").innerText = techTotal;
    document.getElementById("gradeNew").innerText = gradeNew;
    document.getElementById("techNew").innerText = techNew;
  });
}

// 🔘 BUTTON
window.viewStudents = function () {
  window.location.href = "students.html";
}

// 🚪 LOGOUT FUNCTION
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
}
</script>
</body>
</html>
