<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
</head>
<body>

<h2>Enrolled Students</h2>

<table border="1" width="100%" id="studentTable">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Grade</th>
        <th>Tech</th>
    </tr>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAusxC75OaR11Z4FVynUfOD-xogVpm2BY",
  authDomain: "knowitize-tech-academy.firebaseapp.com",
  databaseURL: "https://knowitize-tech-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "knowitize-tech-academy",
  storageBucket: "knowitize-tech-academy.firebasestorage.app",
  messagingSenderId: "1008377804294",
  appId: "1:1008377804294:web:5591dd1d078fd9150ef587"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("studentTable");

onValue(ref(db, "students"), (snapshot) => {
    let data = snapshot.val();

    for (let id in data) {
        let s = data[id];

        let row = table.insertRow();

        row.innerHTML = `
            <td>${s.name || ""}</td>
            <td>${s.email || ""}</td>
            <td>${s.phone || ""}</td>
            <td>${s.grade || "-"}</td>
            <td>${s.tech || "-"}</td>
        `;
    }
});
</script>

</body>
</html>
