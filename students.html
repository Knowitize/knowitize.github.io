<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
</head>
<body>

<h2>Enrolled Students</h2>

<table border="1" width="100%" id="studentTable">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Grade</th>
        <th>Tech</th>
        <th>Payment Status</th>
        <th>Action</th>
        
    </tr>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBAusxC75OaR11Z4FVynUfOD-xogVpm2BY",
    authDomain: "knowitize-tech-academy.firebaseapp.com",
    databaseURL: "https://knowitize-tech-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "knowitize-tech-academy",
    storageBucket: "knowitize-tech-academy.firebasestorage.app",
    messagingSenderId: "1008377804294",
    appId: "1:1008377804294:web:5591dd1d078fd9150ef587"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tableBody = document.getElementById("tableBody");

// Global functions for buttons
window.markPaid = function(id) {
    update(ref(db, "students/" + id), { payment: "Paid" });
};

window.markUnpaid = function(id) {
    update(ref(db, "students/" + id), { payment: "Pending" });
};

// Real-time listener
onValue(ref(db, "students"), (snapshot) => {
    // 1. CLEAR the table first so it doesn't duplicate
    tableBody.innerHTML = "";

    let data = snapshot.val();
    if (!data) return;

    for (let id in data) {
        let s = data[id];
        let row = tableBody.insertRow();

        // 2. Put EVERYTHING inside the template literal
        row.innerHTML = `
            <td>${s.name || ""}</td>
            <td>${s.email || ""}</td>
            <td>${s.phone || ""}</td>
            <td>${s.grade || "-"}</td>
            <td>${s.bootcamp || "-"}</td>
            <td style="color: ${s.payment === 'Paid' ? 'green' : 'red'}; font-weight: bold;">
                ${s.payment || "Pending"}
            </td>
            <td>
                <button onclick="markPaid('${id}')">Mark Paid</button>
                <button onclick="markUnpaid('${id}')">Mark Unpaid</button>
            </td>
        `;
    }
});
</script>

</body>
</html>
