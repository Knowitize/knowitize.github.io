<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Tech Academy</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(7px);
    }

    /* Dark overlay */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 0;
    }

    .login-container {
        position: relative;
        z-index: 1;
        width: 350px;
        padding: 40px 30px;
        border-radius: 15px;
        backdrop-filter: blur(15px);
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        text-align: center;
        color: #fff;
    }

    .logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
    }

    .logo img {
        width: 120px;          /* adjust size here */
        height: auto;
        object-fit: contain;
    }

    h2 {
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    .input-box {
        width: 100%;
        margin-bottom: 15px;
    }

    .input-box input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.5);
        background: transparent;
        color: #fff;
        outline: none;
    }

    .input-box input::placeholder {
        color: #ddd;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(to right, #ff7a18, #ffb347);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover {
        opacity: 0.9;
    }

</style>
</head>

<body>

<div class="login-container">
    <div class="logo"><img src="images/logo1.png"></div>
    <h2>ADMIN LOGIN</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">Login</button>
</div>



<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAusxC75OaR11Z4FVynUfOD-xogVpm2BY",
  authDomain: "knowitize-tech-academy.firebaseapp.com",
  databaseURL: "https://knowitize-tech-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "knowitize-tech-academy",
  storageBucket: "knowitize-tech-academy.firebasestorage.app",
  messagingSenderId: "1008377804294",
  appId: "1:1008377804294:web:5591dd1d078fd9150ef587"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


window.login = function() {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login Successful");
      window.location.href = "admin.html";
    })
    .catch((error) => {
      alert("Invalid Email or Password");
    });
}
</script>

</body>
</html>
