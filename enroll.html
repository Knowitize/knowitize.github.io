<h1 class="page-title">Enroll in Knowitize Tech Academy</h1>
<section class="container">
    <!-- LEFT FORM -->
    <div class="form-section">
        <h3>Student Enrollment</h3>

        <form id="enrollForm">

            <input type="text" name="name" placeholder="Student Name" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Email Address" required><br>

            <!-- Academic Dropdown -->
            <label>Select Academic Grade</label>
            <select id="grade" name="grade" required>

                <option value="1500">Grade 12</option>

            <!-- Tech Dropdown -->

            <select id="tech" name="bootcamp">

                <option value="2500">CSS</option>
                <option value="3000">PHP</option>
                <option value="3000">C / C++</option>
                <option value="3500">SQL</option>
            </select>

            <button type="submit">Enroll Now</button>

        </form>
    </div>

    <!-- RIGHT SUMMARY -->
    <div class="summary">
        <h3>Summary</h3>

        <p>Academic Fee: <span id="gradePrice">0</span></p>
        <p id="techRow">Tech Fee: <span id="techPrice">0</span></p>

<script>
    const grade = document.getElementById("grade");
    const tech = document.getElementById("tech");

    const gradePrice = document.getElementById("gradePrice");
    const techPrice = document.getElementById("techPrice");
    const total = document.getElementById("total");

    function updatePrice() {
        let g = parseInt(grade.value) || 0;
        let t = parseInt(tech.value) || 0;

        gradePrice.innerText = g;
        techPrice.innerText = t;
        total.innerText = g + t;
    }

    grade.addEventListener("change", updatePrice);
    tech.addEventListener("change", updatePrice);

    
    const techRow = document.getElementById("techRow");

    function updatePrice() {
        let g = parseInt(grade.value) || 0;
        let t = parseInt(tech.value) || 0;

        gradePrice.innerText = g;
        total.innerText = g + t;

        if (t > 0) {
            techRow.style.display = "block";
            techPrice.innerText = t;
        } else {
            techRow.style.display = "none";
        }
    }
    
    function updatePrice() {
    let g = parseInt(grade.value) || 0;
    let t = parseInt(tech.value) || 0;

    gradePrice.innerText = g;
    total.innerText = g + t;

    // 👇 Show/Hide tech price
    if (t > 0) {
        techPrice.parentElement.style.display = "block";
        techPrice.innerText = t;
    } else {
        techPrice.parentElement.style.display = "none";
    }
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔥 Your Firebase config (replace with your own)
  const firebaseConfig = {
  apiKey: "AIzaSyBAusxC75OaR11Z4FVynUfOD-xogVpm2BY",
  authDomain: "knowitize-tech-academy.firebaseapp.com",
  databaseURL: "https://knowitize-tech-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "knowitize-tech-academy",
  storageBucket: "knowitize-tech-academy.firebasestorage.app",
  messagingSenderId: "1008377804294",
  appId: "1:1008377804294:web:5591dd1d078fd9150ef587"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🎯 Form Submit
  const form = document.getElementById("enrollForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = form.name.value;
    const phone = form.phone.value;
    const email = form.email.value;
    const grade = form.grade.value;
    const bootcamp = form.bootcamp.value;

    // Save to Firebase
    push(ref(db, "students/"), {
      name: name,
      phone: phone,
      email: email,
      grade: grade,
      bootcamp: bootcamp,
      date: new Date().toLocaleString()
    })
    .then(() => {
      alert("Student Enrolled Successfully!");
      form.reset();
    })
    .catch((error) => {
      console.error(error);
      alert("Error: " + error.message);
    });
  });
</script>
